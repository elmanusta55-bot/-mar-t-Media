<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol.Az | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #10B981; --bg-dark: #0F172A; --card-bg: #1E293B;
            --text-main: #F8FAFC; --text-muted: #94A3B8; --border-color: #334155; --gold: #F59E0B;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); margin: 0; padding-bottom: 80px; }
        h1, h2, .logo, .p-team-name { font-family: 'Poppins', sans-serif; }

        header { background: rgba(15, 23, 42, 0.9); padding: 15px; border-bottom: 1px solid var(--border-color); text-align: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-size: 24px; font-weight: 800; margin: 0; }
        .logo span { color: var(--primary); }

        .section { display: none; max-width: 600px; margin: 20px auto; padding: 0 15px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .card-header { font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--primary); }

        .input-field { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: #0F172A; color: white; margin-bottom: 10px; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        /* POSTER PREVIEW */
        .poster-preview {
            width: 100%; aspect-ratio: 4/5; 
            background: linear-gradient(45deg, #064e3b, #0f172a), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center; border-radius: 12px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
            border: 3px solid var(--border-color);
        }
        .poster-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
        .poster-content { position: relative; z-index: 2; width: 90%; }
        .p-tournament { color: var(--gold); font-size: 12px; letter-spacing: 3px; margin-bottom: 30px; font-weight: 600; }
        .p-team-name { font-size: 32px; font-weight: 800; margin: 5px 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .p-vs { background: var(--gold); color: black; padding: 2px 12px; font-weight: 900; border-radius: 4px; display: inline-block; margin: 10px 0; transform: rotate(-3deg); }
        .p-info { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 30px; margin-top: 30px; font-weight: 600; font-size: 14px; backdrop-filter: blur(5px); }
        
        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1E293B; display: flex; border-top: 1px solid var(--border-color); }
        .nav-btn { flex: 1; padding: 15px 0; text-align: center; font-size: 12px; color: var(--text-muted); cursor: pointer; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { display: block; font-size: 20px; margin-bottom: 4px; }

        /* MÜQAYİSƏ */
        .comp-row { display: flex; justify-content: space-between; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 5px; margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body>

<header><h1 class="logo">FUTBOL<span>.AZ</span></h1></header>

<div id="sec-home" class="section active">
    <div class="card" style="text-align: center;">
        <div class="card-header" style="justify-content: center;">XOŞ GƏLDİN!</div>
        <p>Xal qazanmaq üçün oyunu oyna və ya öz heyətini qur.</p>
        <div style="font-size: 40px; color: var(--gold); font-weight: 800;" id="score-ui">0</div>
        <button class="btn-main" onclick="alert('Tezliklə yeni oyunlar gələcək!')">OYUNA BAŞLA</button>
    </div>
</div>

<div id="sec-poster" class="section">
    <div class="card">
        <div class="card-header"><i class="fas fa-paint-brush"></i> POSTER YARAT</div>
        <input type="text" id="p-t1" class="input-field" placeholder="Komanda 1" oninput="upPoster()" value="QARABAĞ FK">
        <input type="text" id="p-t2" class="input-field" placeholder="Komanda 2" oninput="upPoster()" value="GALATASARAY">
        <input type="text" id="p-dt" class="input-field" placeholder="Tarix və Saat" oninput="upPoster()" value="25 MART | 21:45">
        <input type="text" id="p-st" class="input-field" placeholder="Stadion" oninput="upPoster()" value="Tofiq Bəhramov Stadionu">

        <div class="poster-preview" id="myPoster">
            <div class="poster-overlay"></div>
            <div class="poster-content">
                <div class="p-tournament">XÜSUSİ YOLDAŞLIQ GÖRÜŞÜ</div>
                <div class="p-team-name" id="v-t1">QARABAĞ FK</div>
                <div class="p-vs">VS</div>
                <div class="p-team-name" id="v-t2">GALATASARAY</div>
                <div class="p-info" id="v-dt">25 MART | 21:45</div>
                <div style="margin-top:10px; font-size:12px; opacity:0.8" id="v-st">Tofiq Bəhramov Stadionu</div>
            </div>
        </div>
        <button class="btn-main" style="margin-top:15px;" onclick="window.print()">POSTERİ YÜKLƏ (PRINT)</button>
    </div>
</div>

<div id="sec-compare" class="section">
    <div class="card">
        <div class="card-header"><i class="fas fa-balance-scale"></i> MÜQAYİSƏ</div>
        <select id="p1-sel" class="input-field"></select>
        <select id="p2-sel" class="input-field"></select>
        <button class="btn-main" onclick="startComp()">QARŞILAŞDIR</button>
        <div id="comp-res" style="margin-top:20px;"></div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-btn active" onclick="nav('home')"><i class="fas fa-home"></i>Ana Səhifə</div>
    <div class="nav-btn" onclick="nav('poster')"><i class="fas fa-paint-brush"></i>Poster</div>
    <div class="nav-btn" onclick="nav('compare')"><i class="fas fa-balance-scale"></i>Müqayisə</div>
</nav>

<script>
    // 100 OYUNÇU BAZASI
    const db = [
        { n: "L. Messi", o: 90, pac: 80, sho: 87, pas: 90, dri: 94 },
        { n: "C. Ronaldo", o: 86, pac: 77, sho: 88, pas: 75, dri: 79 },
        { n: "K. Mbappé", o: 91, pac: 97, sho: 90, pas: 80, dri: 92 },
        { n: "E. Haaland", o: 91, pac: 89, sho: 93, pas: 66, dri: 80 },
        { n: "Vini Jr.", o: 89, pac: 95, sho: 82, pas: 81, dri: 90 },
        { n: "J. Bellingham", o: 86, pac: 82, sho: 84, pas: 83, dri: 85 },
        { n: "Juninho", o: 78, pac: 91, sho: 79, pas: 68, dri: 80 },
        { n: "M. Icardi", o: 83, pac: 74, sho: 85, pas: 74, dri: 79 },
        { n: "A. Zoubir", o: 77, pac: 84, sho: 72, pas: 76, dri: 83 },
        { n: "Y. Benzia", o: 76, pac: 75, sho: 75, pas: 80, dri: 81 },
        { n: "Arda Güler", o: 77, pac: 76, sho: 73, pas: 79, dri: 82 },
        { n: "Barış Alper", o: 78, pac: 90, sho: 74, pas: 71, dri: 78 }
        // ... (Siyahını qısaldıram ki, kod çox uzun olmasın, sən əvvəlki 100-lüyü bura əlavə edə bilərsən)
    ];

    window.onload = function() {
        let s1 = document.getElementById('p1-sel'), s2 = document.getElementById('p2-sel');
        db.forEach((p, i) => {
            s1.add(new Option(p.n, i));
            s2.add(new Option(p.n, i));
        });
        s2.selectedIndex = 1;
        upPoster(); // Poster ilk açılanda dolsun
    };

    function nav(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function upPoster() {
        document.getElementById('v-t1').innerText = document.getElementById('p-t1').value.toUpperCase();
        document.getElementById('v-t2').innerText = document.getElementById('p-t2').value.toUpperCase();
        document.getElementById('v-dt').innerText = document.getElementById('p-dt').value.toUpperCase();
        document.getElementById('v-st').innerText = document.getElementById('p-st').value;
    }

    function startComp() {
        let p1 = db[document.getElementById('p1-sel').value];
        let p2 = db[document.getElementById('p2-sel').value];
        let h = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">${p1.n} VS ${p2.n}</div>`;
        const props = [['o','GÜC'],['pac','SÜRƏT'],['sho','ŞUT'],['pas','PAS'],['dri','DRİ']];
        props.forEach(pr => {
            h += `<div class="comp-row"><span>${p1[pr[0]]}</span><b>${pr[1]}</b><span>${p2[pr[0]]}</span></div>`;
        });
        document.getElementById('comp-res').innerHTML = h;
    }
</script>
</body>
</html>
