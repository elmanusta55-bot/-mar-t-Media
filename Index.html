<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol.Az | Professional Match Poster Generator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { 
            --gold: #D4AF37; /* Dizayndakı Qızılı Rəng */
            --bg-dark: #121212;
            --card-bg: #F8FAFC;
            --poster-bg: #0A0A0A;
            --text-main: #111;
            --text-muted: #555;
            --border-color: #E2E8F0;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            background-color: #EFEFEF; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
        
        /* HEADER VƏ LOQO */
        header { 
            background: rgba(0,0,0,0.9); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative;
            height: 120px;
        }
        .logo-container { 
            position: absolute;
            left: 20px;
            top: 0;
            z-index: 1001;
        }
        .logo-circle {
            width: 130px;
            height: 130px;
            background: black;
            border-radius: 50%;
            border: 4px solid var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            padding: 10px;
        }
        /* Kodun içinə əsl loqonun məlumatını qoyuram ki, işlək olsun */
        .logo-img { width: 60px; height: 60px; margin-bottom: 5px; }
        .logo-text { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 18px; color: white; margin: 0; text-transform: uppercase; }
        .logo-text span { color: var(--gold); }
        
        /* TOP RIGHT DÜYMƏLƏR (Yüklə və s.) */
        .top-action-bar { position: absolute; top: 10px; right: 10px; z-index: 1000; display: flex; gap: 10px; }
        
        /* ƏSAS MAKET */
        .main-container { 
            display: grid; 
            grid-template-columns: 1fr 1.5fr; 
            gap: 20px; 
            padding: 20px; 
            margin-top: 30px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        @media(max-width: 1024px) { .main-container { grid-template-columns: 1fr; } header { height: 100px; } .logo-circle { width: 100px; height: 100px; } }
        
        /* SOL TƏRƏF (NƏZARƏT PANELİ) */
        .control-panel { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .app-title { font-size: 26px; font-weight: 800; color: #000; margin: 0 0 30px 0; text-transform: uppercase; line-height: 1.2; text-align: center; }
        
        .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: #FFF; color: #000; font-size: 15px; margin-bottom: 20px; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--gold); }
        
        /* LOQO YÜKLƏMƏ DÜYMƏSİ */
        .upload-label { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; background: #000; color: #fff; font-weight: 700; text-align: center; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; transition: 0.3s; font-family: 'Poppins', sans-serif; font-size: 15px; }
        .upload-label:hover { background: var(--text-muted); }
        
        /* ŞABLON SEÇİMİ (DROPDOWN STİLİ) */
        .template-select { position: relative; }
        .template-select::after { content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #aaa; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); pointer-events: none; }
        
        /* SAĞ TƏRƏF (POSTER PREVIEW) */
        .poster-preview-container { 
            position: relative; 
            padding: 20px; 
            border-radius: 20px; 
            background: var(--dark-bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        /* HƏQİQİ POSTER (BU HİSSƏ ŞƏKİL KİMİ YÜKLƏNƏCƏK) */
        .match-poster {
            width: 100%; aspect-ratio: 4/5; 
            background: var(--poster-bg);
            border-radius: 15px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 40px; overflow: hidden;
            border: 3px solid #E5E7EB;
        }
        
        /* ARXA FON EFFEKTLƏRİ (CSS İLƏ YIĞILMIŞ DUMAN VƏ DİZAYN) */
        .p-bg-gradient { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(132, 204, 22, 0.1) 0%, rgba(10, 10, 10, 0.95) 70%); z-index: 1; }
        .p-gold-gradient { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(212, 175, 55, 0.3), transparent); z-index: 2; mask-image: linear-gradient(to top, black 20%, transparent 100%); -webkit-mask-image: linear-gradient(to top, black 20%, transparent 100%); }
        .p-mist { position: absolute; bottom: 0; left: 0; width: 100%; height: 30%; background: rgba(255,255,255,0.05); z-index: 3; filter: blur(30px); }
        
        /* DİZAYN ELEMENTLƏRİ */
        .p-header-img { width: 30px; height: 30px; position: absolute; top: 40px; z-index: 5; opacity: 0.8; }
        .p-title-tournament { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 800; color: white; position: absolute; top: 80px; z-index: 5; text-transform: uppercase; letter-spacing: 1px; }
        .p-vs-text { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 800; color: white; position: absolute; top: 120px; z-index: 5; text-transform: uppercase; letter-spacing: 1px; }

        .p-teams-area { display: flex; flex-direction: column; align-items: center; position: absolute; top: 160px; z-index: 5; width: 90%; }
        .p-team-name-large { font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 42px; color: white; text-transform: uppercase; margin: 0; letter-spacing: 2px; line-height: 1; text-align: center; }
        
        .p-logos-area { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; width: 100%; }
        .p-logo-slot { width: 90px; height: 90px; border-radius: 5px; border: 2px solid #555; display: flex; justify-content: center; align-items: center; flex-direction: column; overflow: hidden; background: #FFF; box-shadow: 0 4px 6px rgba(0,0,0,0.3); padding: 5px; }
        .p-logo-slot img { width: 100%; height: 100%; object-fit: contain; }
        
        .p-small-vs { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 900; color: var(--gold); transform: scale(1.1); margin: 0 10px; }
        
        .p-sub-teams-names { display: flex; justify-content: center; gap: 20px; margin-top: 15px; width: 100%; }
        .p-sub-team-name { font-family: 'Poppins', sans-serif; width: 100px; text-align: center; text-transform: uppercase; color: var(--gold); font-weight: 700; font-size: 14px; letter-spacing: 1px; }
        
        .p-match-info { position: absolute; bottom: 80px; z-index: 5; text-align: center; color: white; font-weight: 600; font-size: 18px; display: flex; flex-direction: column; gap: 8px; font-family: 'Inter', sans-serif; }
        .p-canli-yayim { color: var(--gold); font-weight: 700; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        
        /* POSTERDƏN KƏNAR DÜYMƏLƏR */
        .poster-actions-bottom { width: 100%; display: flex; gap: 15px; margin-top: 25px; justify-content: center; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; font-family: 'Poppins', sans-serif; }
        .btn-save { background: #FFF; color: #111; padding: 12px 30px; border-radius: 8px; font-weight: 600; }
        .btn-download-final { background: var(--gold); color: #000; padding: 12px 30px; border-radius: 8px; font-weight: 600; }
        .btn-top-save { background: var(--gold); color: #000; padding: 8px 20px; border-radius: 6px; font-weight: 600; font-size: 13px; text-transform: uppercase; }

        /* FONT-AWESOME UNICOODE */
        @font-face {
            font-family: 'Font Awesome 6 Free'; font-style: normal; font-weight: 900; font-display: block; src: url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/webfonts/fa-solid-900.woff2") format("woff2");
        }
    </style>
</head>

    <div id="who-are-ya-game" style="background: #1e1e1e; color: white; padding: 20px; border-radius: 12px; font-family: sans-serif; max-width: 500px; margin: 20px auto; border: 1px solid #333;">
    <h2 style="text-align: center; color: #d4af37; margin-top: 0;">Who Are Ya? 🕵️‍♂️</h2>
    
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="guessInput" placeholder="Futbolçu adı..." style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; outline: none;">
        <button onclick="submitGuess()" style="padding: 10px 15px; border-radius: 5px; border: none; background: #d4af37; color: black; font-weight: bold; cursor: pointer;">Yoxla</button>
    </div>

    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; font-size: 12px; color: #888; font-weight: bold; margin-bottom: 10px;">
        <div>Klub</div><div>Ölkə</div><div>Mövqe</div><div>Yaş</div>

    <div id="resultsList"></div>

    <script>
        const secret = { name: "K. Mbappe", club: "Real Madrid", country: "Fransa", pos: "FW", age: 25 };
        const db = [
            { name: "K. Mbappe", club: "Real Madrid", country: "Fransa", pos: "FW", age: 25 },
            { name: "L. Messi", club: "Inter Miami", country: "Argentina", pos: "FW", age: 36 },
            { name: "C. Ronaldo", club: "Al Nassr", country: "Portuqaliya", pos: "FW", age: 39 },
            { name: "Juninho", club: "Qarabağ", country: "Braziliya", pos: "FW", age: 27 },
            { name: "M. Icardi", club: "Qalatasaray", country: "Argentina", pos: "FW", age: 31 }
        ];

        function submitGuess() {
            const val = document.getElementById("guessInput").value.trim();
            const player = db.find(p => p.name.toLowerCase() === val.toLowerCase());
            if (!player) return alert("Oyunçu tapılmadı!");

            const res = document.getElementById("resultsList");
            const row = document.createElement("div");
            row.style.marginBottom = "10px";
            
            const getCls = (p, s, key) => p[key] === s[key] ? "background:#22c55e" : "background:#ef4444";
            const ageArrow = player.age < secret.age ? "↑" : (player.age > secret.age ? "↓" : "");

            row.innerHTML = `
                <div style="font-size:12px; color:#d4af37; font-weight:bold; margin-bottom:3px;">${player.name}</div>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; text-align:center; font-weight:bold; font-size:13px;">
                    <div style="padding:10px 2px; border-radius:4px; ${getCls(player, secret, 'club')}">${player.club}</div>
                    <div style="padding:10px 2px; border-radius:4px; ${getCls(player, secret, 'country')}">${player.country}</div>
                    <div style="padding:10px 2px; border-radius:4px; ${getCls(player, secret, 'pos')}">${player.pos}</div>
                    <div style="padding:10px 2px; border-radius:4px; ${getCls(player, secret, 'age')}">${player.age}${ageArrow}</div>
                </div>`;
            res.prepend(row);
            document.getElementById("guessInput").value = "";
        }
    </script>
    </div>
    

<script>
    // Dinamik Yeniləmə Funksiyası
    function updatePoster() {
        // Sol tərəfdəki inputlardan məlumatları oxu
        const tournament = document.getElementById('tournamentName').value;
        const homeTeam = document.getElementById('homeTeamName').value;
        const awayTeam = document.getElementById('awayTeamName').value;
        const date = document.getElementById('matchDate').value;
        const time = document.getElementById('matchTime').value;
        const stadium = document.getElementById('stadiumName').value;
        const template = document.getElementById('template').value;
        
        // Sağ tərəfdəki posterə yaz
        document.getElementById('p-tournament').innerText = tournament.toUpperCase();
        document.getElementById('p-h-name').innerText = homeTeam.toUpperCase();
        document.getElementById('p-a-name').innerText = awayTeam.toUpperCase();
        document.getElementById('p-h-sub').innerText = homeTeam.toUpperCase();
        document.getElementById('p-a-sub').innerText = awayTeam.toUpperCase();
        document.getElementById('p-date').innerText = date;
        document.getElementById('p-time').innerText = time;
        document.getElementById('p-stadium').innerText = stadium.toUpperCase();
        
        // Şablon dəyişikliyi (Nümunə kimi bir qızılı gradienti aç/bağla)
        if(template === 'classic') {
            document.getElementById('p-gold-grad').style.display = 'none';
        } else {
            document.getElementById('p-gold-grad').style.display = 'block';
        }
    }

    // Loqo Yükləmə Funksiyası (Həqiqi fayl yükləmə)
    function loadLogo(logoId, input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                document.getElementById(logoId).setAttribute('src', e.target.result);
                // Komandanın adını loqonun alt mətninə də əlavə et
                const teamName = logoId === 'homeTeamLogo' ? document.getElementById('homeTeamName').value : document.getElementById('awayTeamName').value;
                document.getElementById(logoId).setAttribute('alt', teamName);
            }
            
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Yadda Saxla / Yüklə Funksiyası (Həqiqi şəkil yükləmə)
    function downloadPoster() {
        // Şəkil olacaq elementi seçirik
        const posterContainer = document.getElementById('matchPosterFinal');
        
        // Düymənin yazısını dəyişək ki, yükləndiyini istifadəçi bilsin
        const downloadBtn = event.target;
        const originalText = downloadBtn.innerText;
        downloadBtn.innerText = "HAZIRLANIR...";
        
        // html2canvas vasitəsilə posteri canva-ya çeviririk
        html2canvas(posterContainer, {
            scale: 2, // Keyfiyyəti artırmaq üçün 2 dəfə böyüdürük
            backgroundColor: null, // Arxa fon yox
            useCORS: true, // Xarici loqolar yüklənə bilsin
            logging: false, // Konsolda log göstərmə
        }).then(function(canvas) {
            // Canvadan şəkil linkini (PNG) alırıq
            const image = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");
            
            // Gizli bir link yaradaraq şəkli avtomatik yüklətdiririk
            const link = document.createElement('a');
            link.download = `futbolaz_match_poster_${Date.now()}.png`;
            link.href = image;
            link.click();
            
            // Düymənin yazısını qaytaraq
            downloadBtn.innerText = originalText;
        });
    }

    // Səhifə yüklənəndə ilkin yeniləməni et
    window.onload = function() {
        // Nümunə loqolarını kodun içine hardcoded qoyaq ki, boş görünməsin
        // Amma istifadəçi yükləyəndə bunlar dəyişəcək
        document.getElementById('homeTeamLogo').setAttribute('src', '');
        document.getElementById('awayTeamLogo').setAttribute('src', '');
        updatePoster();
    }
</script>

</body>
</html>
